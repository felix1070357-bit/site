<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="google-site-verification" content="UeShjC42yYTaGharmEB2kjRgCO5QSjBua0pjbpD79Co" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorTools | 極簡高效創作者工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="wrench" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white">CreatorTools</h1>
                </div>
            </div>
            <!-- Professional Navigation or Link -->
            <nav>
                <a href="#" class="text-slate-400 hover:text-white text-sm transition">關於我們</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 w-full flex-grow grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <div class="lg:col-span-1 flex flex-col gap-2">
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-3 mb-2">工具選單</h2>
            <button onclick="switchTab('compressor')" id="btn-compressor" class="tab-btn active flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-medium text-left transition w-full">
                <i data-lucide="image" class="w-5 h-5"></i> 圖片極速壓縮
            </button>
            <button onclick="switchTab('qrcode')" id="btn-qrcode" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-300 font-medium text-left transition w-full">
                <i data-lucide="qr-code" class="w-5 h-5"></i> QR Code 產生器
            </button>
            <button onclick="switchTab('password')" id="btn-password" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-300 font-medium text-left transition w-full">
                <i data-lucide="key" class="w-5 h-5"></i> 安全密碼產生器
            </button>

            <!-- Affiliate / Recommendation Zone -->
            <div class="mt-8 border border-slate-800 rounded-2xl p-4 bg-slate-950">
                <span class="text-[10px] text-slate-600 font-bold uppercase tracking-widest mb-4 block">精選推薦</span>
                <a href="#" class="block p-3 rounded-lg hover:bg-slate-900 border border-slate-800 transition mb-2">
                    <p class="text-sm font-semibold text-white">Cloud Hosting</p>
                    <p class="text-xs text-slate-500">高效能雲端伺服器推薦</p>
                </a>
                <a href="#" class="block p-3 rounded-lg hover:bg-slate-900 border border-slate-800 transition">
                    <p class="text-sm font-semibold text-white">Design Pro</p>
                    <p class="text-xs text-slate-500">專業創作者必備工具</p>
                </a>
            </div>
        </div>

        <div class="lg:col-span-3 flex flex-col gap-6">
            <div id="tab-compressor" class="tab-content active bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-xl">
                <h3 class="text-xl font-bold text-white mb-6">圖片極速壓縮</h3>
                <div class="border-2 border-dashed border-slate-800 rounded-2xl p-12 text-center hover:border-indigo-500/50 transition cursor-pointer relative" id="drop-zone">
                    <input type="file" id="image-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <p class="text-slate-300">點擊或拖曳上傳圖片</p>
                </div>
            </div>
            
            <div id="tab-qrcode" class="tab-content bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-xl">
                <h3 class="text-xl font-bold text-white mb-6">QR Code 產生器</h3>
                <input type="text" id="qr-input" placeholder="輸入連結..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white mb-4">
                <button onclick="generateQRCode()" class="w-full py-3 bg-emerald-600 rounded-xl font-semibold">產生</button>
            </div>

            <div id="tab-password" class="tab-content bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-xl">
                <h3 class="text-xl font-bold text-white mb-6">安全密碼產生器</h3>
                <input type="text" id="password-display" readonly class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-4 mb-4 text-amber-400 font-mono">
                <button onclick="generatePassword()" class="w-full py-3 bg-amber-600 rounded-xl font-semibold">產生新密碼</button>
            </div>
        </div>
    </main>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-300 font-medium text-left transition w-full");
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`btn-${tabId}`).className = "tab-btn active flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-medium text-left transition w-full";
        }
        lucide.createIcons();
        
        function generateQRCode() { /* QR Logic */ }
        function generatePassword() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
            let pwd = "";
            for(let i=0; i<16; i++) pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('password-display').value = pwd;
        }
    </script>
</body>
</html>
